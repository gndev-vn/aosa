name: aosa
description: Another Open Source Authenticator — Cross-platform TOTP manager.
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.5.0
  flutter: ^3.27.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Local database
  sqlite3: ^3.3.3
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.0
  path: ^1.9.0

  # Secure storage
  flutter_secure_storage: ^10.3.1
  local_auth: ^3.0.1

  # Cryptography
  cryptography: ^2.7.0

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^7.1.1

  # QR scanning
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  image_picker: ^1.1.2

  # Desktop features
  system_tray: ^2.0.0
  hotkey_manager: ^0.2.0
  window_manager: ^0.5.1

  # Notifications
  flutter_local_notifications: ^22.0.0

  # UI
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.20.2
  logger: ^2.5.0
  meta: ^1.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
